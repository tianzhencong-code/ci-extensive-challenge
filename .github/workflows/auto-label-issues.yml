name: Auto Label Issues

on:
  issues:
    types: [opened]

jobs:
  label-issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Check issue title and apply labels
        uses: actions/github-script@v7
        with:
          script: |
            const issueTitle = context.payload.issue.title.toLowerCase();
            const issueNumber = context.payload.issue.number;
            const labelsToAdd = [];
            
            // Label as 'bug' if title contains 'error'
            if (issueTitle.includes('error')) {
              labelsToAdd.push('bug');
            }
            
            // Label as 'feature' if title contains 'add'
            if (issueTitle.includes('add')) {
              labelsToAdd.push('feature');
            }
            
            // Apply labels if any were found
            if (labelsToAdd.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                labels: labelsToAdd
              });
              console.log(`Added labels ${labelsToAdd.join(', ')} to issue #${issueNumber}`);
            } else {
              console.log(`No matching keywords found in issue #${issueNumber}`);
            }
